version: "3.9"

# Local development environment — MinIO (S3-compatible object storage)
#
# Usage:
#   docker compose -f local-env/docker-compose.yml up -d
#
# MinIO console: http://localhost:9001  (user: minioadmin / minioadmin)
# S3 API:        http://localhost:9000
#
# The "createbuckets" service auto-creates the default bucket on startup.

services:

  minio:
    image: quay.io/minio/minio:latest
    container_name: orhestra-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  createbuckets:
    image: quay.io/minio/mc:latest
    container_name: orhestra-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/orhestra-algorithms &&
        echo 'Bucket orhestra-algorithms ready.' &&
        exit 0
      "

volumes:
  minio-data:
